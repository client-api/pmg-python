services:
  pmg-test:
    image: ghcr.io/client-api/proxmox-docker/pmg-test:latest
    container_name: pmg-test
    privileged: true
    tmpfs:
      - /tmp
      - /run
      - /run/lock
    ports:
      - "8006:8006"
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -o /dev/null -w '%{http_code}' https://localhost:8006/api2/json/version | grep -qE '^(200|401)$'"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
